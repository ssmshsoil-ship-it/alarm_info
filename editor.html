<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>kFarmAI 거래처 발송문 편집</title>
  <style>
    :root {
      --bg: #f5f7f2;
      --card: #fff;
      --text: #1f241d;
      --muted: #687064;
      --line: #dfe5dc;
      --green: #267345;
      --green-soft: #e7f3eb;
      --blue: #255f91;
      --blue-soft: #e5f0fa;
      --red: #b42318;
      --shadow: 0 8px 24px rgba(31, 43, 27, .08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(245, 247, 242, .95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
    }

    .wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 12px;
    }

    h1 {
      margin: 0;
      font-size: 19px;
      letter-spacing: 0;
    }

    .sub {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-top: 10px;
    }

    button, select, input, textarea {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 8px;
      padding: 10px 11px;
      font-weight: 800;
      cursor: pointer;
    }

    button.primary {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }

    button.blue {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    button.tab.active {
      background: var(--green);
      color: #fff;
      border-color: var(--green);
    }

    main {
      padding-bottom: 32px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      margin-top: 12px;
      overflow: hidden;
    }

    .panel-head {
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .panel-title {
      font-weight: 900;
      font-size: 15px;
    }

    .panel-body {
      padding: 12px;
    }

    .grid {
      display: grid;
      gap: 8px;
    }

    .row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fff;
      color: var(--text);
    }

    textarea {
      resize: vertical;
      min-height: 110px;
    }

    #messageText {
      min-height: 330px;
      line-height: 1.5;
      font-size: 15px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .actions.three {
      grid-template-columns: repeat(3, 1fr);
    }

    .list {
      display: grid;
      gap: 8px;
    }

    .article {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      padding: 10px;
    }

    .article strong {
      display: block;
      font-size: 15px;
      margin-bottom: 5px;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .badge {
      display: inline-flex;
      border-radius: 999px;
      padding: 3px 7px;
      background: var(--green-soft);
      color: var(--green);
      font-weight: 900;
      font-size: 12px;
    }

    .badge.blue {
      background: var(--blue-soft);
      color: var(--blue);
    }

    .small {
      color: var(--muted);
      font-size: 12px;
    }

    .hidden { display: none; }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: #1e2a1d;
      color: #fff;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
      z-index: 50;
    }

    .toast.show { opacity: 1; }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 26px 10px;
    }

    @media (max-width: 560px) {
      .wrap { padding: 10px; }
      .row2, .actions, .actions.three { grid-template-columns: 1fr; }
      #messageText { min-height: 360px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>거래처 발송문 편집</h1>
      <div class="sub">수집 기사/공고를 거래처용 카톡 문구로 편집합니다.</div>
      <div class="tabs">
        <button class="tab active" data-tab="articles">기사선택</button>
        <button class="tab" data-tab="editor">문구편집</button>
        <button class="tab" data-tab="drafts">저장목록</button>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section id="tab-articles">
      <div class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title">수집 기사/공고</div>
            <div class="small" id="loadStatus">alerts.json 자동 불러오기 대기</div>
          </div>
          <button id="reloadBtn">새로고침</button>
        </div>
        <div class="panel-body grid">
          <input id="searchInput" placeholder="제목, 출처, 품목, 지역 검색" />
          <div class="row2">
            <select id="categoryFilter"></select>
            <select id="regionFilter"></select>
          </div>
          <div class="list" id="articleList"></div>
        </div>
      </div>
    </section>

    <section id="tab-editor" class="hidden">
      <div class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title">거래처 발송문</div>
            <div class="small">내용을 직접 고친 뒤 복사해서 카톡에 붙여넣으세요.</div>
          </div>
        </div>
        <div class="panel-body grid">
          <div class="row2">
            <input id="customerInput" placeholder="거래처명 예: 화순농협" />
            <input id="senderInput" placeholder="발신자 예: 성화 송성민" />
          </div>
          <div class="row2">
            <select id="toneInput">
              <option value="basic">기본 안내형</option>
              <option value="sales">영업 제안형</option>
              <option value="urgent">마감 알림형</option>
              <option value="short">짧은 문자형</option>
            </select>
            <button id="makeTemplateBtn">문구 다시작성</button>
          </div>
          <textarea id="messageText" placeholder="기사선택 탭에서 기사를 선택하거나, 여기에 직접 작성하세요."></textarea>
          <div class="actions three">
            <button class="primary" id="copyBtn">카톡복사</button>
            <button id="saveDraftBtn">저장</button>
            <button id="downloadTxtBtn">TXT저장</button>
          </div>
          <div class="small">주의: 신청기간, 금액, 대상자는 원문과 담당기관 확인 후 발송하세요.</div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">직접 붙여넣기</div>
        </div>
        <div class="panel-body grid">
          <textarea id="manualArticleText" placeholder="외부 기사/공고 내용을 붙여넣고 아래 버튼을 누르면 발송문 초안을 만듭니다."></textarea>
          <button class="blue" id="manualMakeBtn">붙여넣은 내용으로 작성</button>
        </div>
      </div>
    </section>

    <section id="tab-drafts" class="hidden">
      <div class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title">저장목록</div>
            <div class="small">이 브라우저에 저장됩니다.</div>
          </div>
          <button id="clearDraftsBtn">전체삭제</button>
        </div>
        <div class="panel-body">
          <div class="list" id="draftList"></div>
        </div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast">완료</div>

  <script>
    const ALERTS_URL = "alerts.json";
    const DRAFT_KEY = "kfarmai_customer_message_drafts_v1";
    let alerts = [];
    let selectedAlert = null;

    const el = (id) => document.getElementById(id);

    function showToast(text) {
      el("toast").textContent = text;
      el("toast").classList.add("show");
      setTimeout(() => el("toast").classList.remove("show"), 1400);
    }

    function showTab(name) {
      document.querySelectorAll(".tab").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.tab === name);
      });
      ["articles", "editor", "drafts"].forEach(tab => {
        el(`tab-${tab}`).classList.toggle("hidden", tab !== name);
      });
      if (name === "drafts") renderDrafts();
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalizeAlert(a) {
      return {
        id: a.id || `${Date.now()}_${Math.random()}`,
        title: a.title || "제목 없음",
        source: a.source || "출처 미확인",
        region: a.region || "전국",
        category: a.category || "농업뉴스",
        published_at: a.published_at || a.startDate || "",
        deadline: a.deadline || a.endDate || "",
        method: a.method || "원문 확인 필요",
        url: a.url || "",
        summary: a.summary || a.summaries || []
      };
    }

    async function loadAlerts() {
      try {
        const res = await fetch(`${ALERTS_URL}?ts=${Date.now()}`, { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const rows = Array.isArray(data) ? data : (data.alerts || []);
        alerts = rows.map(normalizeAlert);
        el("loadStatus").textContent = `수집정보 ${alerts.length}건 불러옴`;
      } catch {
        alerts = sampleAlerts();
        el("loadStatus").textContent = "alerts.json 없음. 예시/수동작성 모드";
      }
      renderFilters();
      renderArticles();
    }

    function sampleAlerts() {
      return [
        normalizeAlert({
          title: "상토·비료·농업 보조사업 관련 정보를 붙여넣어 사용하세요",
          source: "사용 예시",
          region: "전국",
          category: "상토",
          published_at: new Date().toISOString().slice(0, 10),
          method: "원문 확인 필요",
          summary: [
            "기사선택 또는 직접 붙여넣기로 거래처 발송문을 만들 수 있습니다.",
            "거래처명과 발신자를 입력하면 문구에 반영됩니다.",
            "최종 발송 전 날짜, 금액, 대상자를 반드시 확인하세요."
          ]
        })
      ];
    }

    function renderFilters() {
      const cats = ["전체품목", ...new Set(alerts.map(a => a.category || "기타").sort())];
      const regions = ["전체지역", ...new Set(alerts.map(a => a.region || "전국").sort())];
      el("categoryFilter").innerHTML = cats.map(x => `<option>${escapeHtml(x)}</option>`).join("");
      el("regionFilter").innerHTML = regions.map(x => `<option>${escapeHtml(x)}</option>`).join("");
    }

    function filteredAlerts() {
      const q = el("searchInput").value.trim().toLowerCase();
      const cat = el("categoryFilter").value;
      const region = el("regionFilter").value;
      return alerts
        .filter(a => cat === "전체품목" || a.category === cat)
        .filter(a => region === "전체지역" || a.region === region)
        .filter(a => {
          if (!q) return true;
          return [a.title, a.source, a.region, a.category, a.method, ...(a.summary || [])]
            .join(" ")
            .toLowerCase()
            .includes(q);
        });
    }

    function renderArticles() {
      const rows = filteredAlerts();
      if (!rows.length) {
        el("articleList").innerHTML = `<div class="empty">조건에 맞는 정보가 없습니다.</div>`;
        return;
      }
      el("articleList").innerHTML = rows.map(a => `
        <article class="article">
          <div class="meta">
            <span class="badge">${escapeHtml(a.category)}</span>
            <span class="badge blue">${escapeHtml(a.region)}</span>
          </div>
          <strong>${escapeHtml(a.title)}</strong>
          <div class="meta">
            <span>${escapeHtml(a.source)}</span>
            <span>·</span>
            <span>${escapeHtml(a.published_at || "날짜미정")}</span>
          </div>
          <div class="small">${escapeHtml((a.summary || []).slice(0, 2).join(" / "))}</div>
          <div class="actions">
            <button data-id="${escapeHtml(a.id)}" data-action="use">발송문 작성</button>
            ${a.url ? `<button data-id="${escapeHtml(a.id)}" data-action="open">원문</button>` : `<button disabled>원문없음</button>`}
          </div>
        </article>
      `).join("");
    }

    function makeMessage(alert) {
      const customer = el("customerInput").value.trim();
      const sender = el("senderInput").value.trim();
      const tone = el("toneInput").value;
      const toLine = customer ? `${customer} 담당자님께` : "담당자님께";
      const fromLine = sender ? `\n\n-${sender} 드림` : "";
      const summary = (alert.summary || []).slice(0, 3).map(s => `- ${s}`).join("\n");
      const sourceLine = alert.url ? `${alert.source}\n${alert.url}` : alert.source;

      if (tone === "short") {
        return [
          toLine,
          "",
          `[${alert.category}] ${alert.title}`,
          summary,
          "",
          `출처: ${sourceLine}`,
          "정확한 신청기간/대상자는 원문 확인 부탁드립니다.",
          fromLine.trim()
        ].filter(Boolean).join("\n");
      }

      if (tone === "sales") {
        return [
          toLine,
          "",
          `관련해서 참고하실 만한 ${alert.category} 정보가 있어 공유드립니다.`,
          "",
          `제목: ${alert.title}`,
          `지역: ${alert.region}`,
          `게시일: ${alert.published_at || "원문 확인 필요"}`,
          "",
          summary,
          "",
          "거래처 문의나 신청 준비에 참고하시면 좋겠습니다.",
          `출처: ${sourceLine}`,
          "",
          "세부 신청기간, 대상자, 금액은 원문과 담당기관 확인이 필요합니다.",
          fromLine.trim()
        ].filter(Boolean).join("\n");
      }

      if (tone === "urgent") {
        return [
          toLine,
          "",
          `[확인 필요] ${alert.category} 관련 알림입니다.`,
          "",
          alert.title,
          "",
          summary,
          "",
          `마감/신청일: ${alert.deadline || "원문 확인 필요"}`,
          `신청방법: ${alert.method || "원문 확인 필요"}`,
          `출처: ${sourceLine}`,
          "",
          "누락되지 않도록 오늘 중 원문 확인 부탁드립니다.",
          fromLine.trim()
        ].filter(Boolean).join("\n");
      }

      return [
        toLine,
        "",
        `${alert.category} 관련 정보 공유드립니다.`,
        "",
        `제목: ${alert.title}`,
        `지역: ${alert.region}`,
        `게시일: ${alert.published_at || "원문 확인 필요"}`,
        "",
        summary,
        "",
        `신청방법: ${alert.method || "원문 확인 필요"}`,
        `출처: ${sourceLine}`,
        "",
        "정확한 신청기간, 대상자, 금액은 원문과 담당기관을 재확인해 주세요.",
        fromLine.trim()
      ].filter(Boolean).join("\n");
    }

    function useAlert(id) {
      selectedAlert = alerts.find(a => a.id === id);
      if (!selectedAlert) return;
      el("messageText").value = makeMessage(selectedAlert);
      showTab("editor");
    }

    function makeManualMessage() {
      const text = el("manualArticleText").value.trim();
      if (!text) return;
      const first = text.split(/\n+/).find(Boolean) || "직접 입력 정보";
      selectedAlert = normalizeAlert({
        title: first.slice(0, 80),
        source: "직접입력",
        region: "전국",
        category: "농업정보",
        published_at: new Date().toISOString().slice(0, 10),
        summary: text.split(/\n+/).slice(1, 4)
      });
      el("messageText").value = makeMessage(selectedAlert);
      showToast("발송문 작성 완료");
    }

    async function copyText(text) {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return;
      }
      const area = document.createElement("textarea");
      area.value = text;
      area.style.position = "fixed";
      area.style.left = "-9999px";
      document.body.appendChild(area);
      area.focus();
      area.select();
      document.execCommand("copy");
      area.remove();
    }

    function getDrafts() {
      try {
        return JSON.parse(localStorage.getItem(DRAFT_KEY) || "[]");
      } catch {
        return [];
      }
    }

    function setDrafts(rows) {
      localStorage.setItem(DRAFT_KEY, JSON.stringify(rows));
    }

    function saveDraft() {
      const text = el("messageText").value.trim();
      if (!text) return;
      const rows = getDrafts();
      rows.unshift({
        id: `${Date.now()}_${Math.random()}`,
        title: selectedAlert?.title || text.split("\n")[0] || "저장문구",
        text,
        savedAt: new Date().toISOString()
      });
      setDrafts(rows.slice(0, 50));
      showToast("저장 완료");
    }

    function renderDrafts() {
      const rows = getDrafts();
      if (!rows.length) {
        el("draftList").innerHTML = `<div class="empty">저장된 문구가 없습니다.</div>`;
        return;
      }
      el("draftList").innerHTML = rows.map(d => `
        <article class="article">
          <strong>${escapeHtml(d.title)}</strong>
          <div class="meta">${escapeHtml(new Date(d.savedAt).toLocaleString("ko-KR"))}</div>
          <div class="small">${escapeHtml(d.text.slice(0, 120))}</div>
          <div class="actions">
            <button data-id="${escapeHtml(d.id)}" data-action="load-draft">불러오기</button>
            <button data-id="${escapeHtml(d.id)}" data-action="copy-draft">복사</button>
          </div>
        </article>
      `).join("");
    }

    function downloadTxt() {
      const text = el("messageText").value;
      if (!text.trim()) return;
      const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `거래처_발송문_${new Date().toISOString().slice(0, 10)}.txt`;
      a.click();
      URL.revokeObjectURL(url);
    }

    document.querySelectorAll(".tab").forEach(btn => {
      btn.addEventListener("click", () => showTab(btn.dataset.tab));
    });

    ["searchInput", "categoryFilter", "regionFilter"].forEach(id => {
      el(id).addEventListener("input", renderArticles);
      el(id).addEventListener("change", renderArticles);
    });

    el("reloadBtn").addEventListener("click", loadAlerts);
    el("makeTemplateBtn").addEventListener("click", () => {
      if (selectedAlert) el("messageText").value = makeMessage(selectedAlert);
    });
    el("manualMakeBtn").addEventListener("click", makeManualMessage);
    el("copyBtn").addEventListener("click", async () => {
      await copyText(el("messageText").value);
      showToast("복사 완료");
    });
    el("saveDraftBtn").addEventListener("click", saveDraft);
    el("downloadTxtBtn").addEventListener("click", downloadTxt);
    el("clearDraftsBtn").addEventListener("click", () => {
      if (!confirm("저장목록을 모두 삭제할까요?")) return;
      setDrafts([]);
      renderDrafts();
    });

    el("articleList").addEventListener("click", (event) => {
      const btn = event.target.closest("button");
      if (!btn) return;
      const alert = alerts.find(a => a.id === btn.dataset.id);
      if (!alert) return;
      if (btn.dataset.action === "use") useAlert(alert.id);
      if (btn.dataset.action === "open" && alert.url) window.open(alert.url, "_blank", "noopener,noreferrer");
    });

    el("draftList").addEventListener("click", async (event) => {
      const btn = event.target.closest("button");
      if (!btn) return;
      const draft = getDrafts().find(d => d.id === btn.dataset.id);
      if (!draft) return;
      if (btn.dataset.action === "load-draft") {
        el("messageText").value = draft.text;
        showTab("editor");
      }
      if (btn.dataset.action === "copy-draft") {
        await copyText(draft.text);
        showToast("복사 완료");
      }
    });

    loadAlerts();
  </script>
</body>
</html>
