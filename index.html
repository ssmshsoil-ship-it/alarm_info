<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>kFarmAI 알람정보 개인앱</title>
  <style>
    :root {
      --bg: #f6f7f4;
      --panel: #ffffff;
      --text: #20231f;
      --muted: #6d746b;
      --line: #dfe4dc;
      --green: #287447;
      --green-2: #e6f2ea;
      --amber: #8a5a00;
      --amber-bg: #fff3d6;
      --red: #b42318;
      --red-bg: #fee4e2;
      --blue: #255e91;
      --blue-bg: #e5f0fa;
      --shadow: 0 8px 24px rgba(30, 45, 28, 0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(246, 247, 244, 0.94);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 14px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0;
    }

    .today {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .tab {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 8px;
      padding: 9px 12px;
      font-weight: 700;
      white-space: nowrap;
      cursor: pointer;
    }

    .tab.active {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }

    main.wrap {
      padding-top: 16px;
      padding-bottom: 36px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr auto;
      gap: 8px;
      margin-bottom: 12px;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      padding: 10px 11px;
      font: inherit;
      color: var(--text);
    }

    textarea {
      min-height: 78px;
      resize: vertical;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 8px;
      padding: 10px 12px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button.primary {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }

    button.danger {
      color: var(--red);
      border-color: #f2b8b5;
      background: #fff;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 330px;
      gap: 12px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }

    .panel-title {
      font-size: 16px;
      font-weight: 800;
    }

    .panel-body {
      padding: 12px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .stat {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
    }

    .stat strong {
      display: block;
      font-size: 20px;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
    }

    .cards {
      display: grid;
      gap: 10px;
    }

    .card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }

    .card.warn {
      border-color: #f2c46d;
      background: #fffaf0;
    }

    .card.expired {
      border-color: #f2b8b5;
      background: #fff8f7;
    }

    .card-title {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .card-title strong {
      font-size: 17px;
      word-break: keep-all;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .badge.green { color: var(--green); background: var(--green-2); }
    .badge.amber { color: var(--amber); background: var(--amber-bg); }
    .badge.red { color: var(--red); background: var(--red-bg); }
    .badge.blue { color: var(--blue); background: var(--blue-bg); }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .brief {
      margin: 8px 0;
      padding-left: 18px;
    }

    .brief li {
      margin: 3px 0;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .form-grid {
      display: grid;
      gap: 8px;
    }

    .row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .small {
      color: var(--muted);
      font-size: 12px;
    }

    .hidden { display: none; }

    .copy-preview {
      white-space: pre-wrap;
      background: #fbfcfa;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      min-height: 160px;
      font-size: 14px;
    }

    .empty {
      padding: 26px 12px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 820px) {
      .toolbar {
        grid-template-columns: 1fr;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .summary {
        grid-template-columns: repeat(2, 1fr);
      }

      .row2 {
        grid-template-columns: 1fr;
      }

      .card-title {
        display: block;
      }

      .card-title .badge {
        margin-top: 6px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <div class="topbar">
        <h1>kFarmAI 알람정보</h1>
        <div class="today" id="todayText"></div>
      </div>
      <div class="tabs">
        <button class="tab active" data-tab="alerts">알람정보</button>
        <button class="tab" data-tab="register">알람등록</button>
        <button class="tab" data-tab="backup">백업/복원</button>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section id="tab-alerts">
      <div class="summary">
        <div class="stat"><strong id="statTotal">0</strong><span>전체 알람</span></div>
        <div class="stat"><strong id="statOpen">0</strong><span>진행중</span></div>
        <div class="stat"><strong id="statSoon">0</strong><span>마감임박</span></div>
        <div class="stat"><strong id="statExpired">0</strong><span>마감</span></div>
      </div>

      <div class="toolbar">
        <input id="searchInput" placeholder="지역, 제목, 품목, 출처 검색" />
        <select id="regionFilter"></select>
        <select id="categoryFilter"></select>
        <button id="reloadRemoteBtn">최신수집</button>
      </div>

      <div class="grid">
        <div class="cards" id="alertList"></div>

        <aside class="panel">
          <div class="panel-head">
            <div class="panel-title">카톡복사 미리보기</div>
            <button id="copyPreviewBtn">복사</button>
          </div>
          <div class="panel-body">
            <div class="copy-preview" id="copyPreview">알람을 선택하면 카톡 공유용 문구가 표시됩니다.</div>
          </div>
        </aside>
      </div>
    </section>

    <section id="tab-register" class="hidden">
      <div class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title">알람등록</div>
            <div class="small">공고나 뉴스를 들으면 먼저 여기에 적고, 나중에 웹 서비스에 반영합니다.</div>
          </div>
          <button id="newAlertBtn">새 입력</button>
        </div>
        <div class="panel-body">
          <form id="alertForm" class="form-grid">
            <input type="hidden" id="alertId" />
            <div class="row2">
              <input id="titleInput" required placeholder="제목" />
              <input id="sourceInput" placeholder="출처 예: 화순군 공고, 농민신문" />
            </div>
            <div class="row2">
              <input id="regionInput" placeholder="지역 예: 전남 화순군" />
              <select id="categoryInput">
                <option>상토</option>
                <option>비료</option>
                <option>퇴비</option>
                <option>종자</option>
                <option>농약</option>
                <option>농업e지</option>
                <option>농업뉴스</option>
                <option>기타</option>
              </select>
            </div>
            <div class="row2">
              <label class="small">시작일<input id="startDateInput" type="date" /></label>
              <label class="small">마감일<input id="endDateInput" type="date" /></label>
            </div>
            <div class="row2">
              <input id="methodInput" placeholder="신청방법 예: 농업e지 또는 읍면사무소 방문" />
              <input id="urlInput" placeholder="원문 링크" />
            </div>
            <textarea id="summaryInput" placeholder="요약 1줄씩 입력. 예:&#10;신청기간을 확인해야 합니다.&#10;농지소재지 읍면사무소에서 신청 가능합니다."></textarea>
            <div class="actions">
              <button class="primary" type="submit">저장</button>
              <button class="danger" type="button" id="deleteAlertBtn">삭제</button>
            </div>
          </form>
        </div>
      </div>
    </section>

    <section id="tab-backup" class="hidden">
      <div class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title">백업/복원</div>
            <div class="small">개인앱 데이터는 이 브라우저에 저장됩니다. 파일로 백업해 두면 다른 PC에서도 복원할 수 있습니다.</div>
          </div>
        </div>
        <div class="panel-body form-grid">
          <div class="actions">
            <button id="exportBtn">JSON 백업 다운로드</button>
            <button id="importBtn">JSON 복원</button>
            <input id="importFile" class="hidden" type="file" accept="application/json,.json" />
          </div>
          <textarea id="backupText" placeholder="백업 데이터 미리보기"></textarea>
        </div>
      </div>
    </section>
  </main>

  <script>
    const STORE_KEY = "kfarmai_alarm_info_v1";
    const today = new Date();

    const sampleAlerts = [
      {
        id: makeId(),
        title: "농업e지 온라인 신청 및 읍면 방문 신청 안내",
        source: "수동입력",
        region: "전국",
        category: "농업e지",
        startDate: "2026-06-11",
        endDate: "2026-07-10",
        method: "농업e지 온라인 신청 또는 농지소재지 읍면사무소 방문",
        url: "",
        summaries: [
          "상토, 비료, 퇴비, 종자, 작물보호제 관련 신청 일정을 확인합니다.",
          "읍면 사무소 또는 동행정복지센터 방문 신청은 지역별 공고 확인이 필요합니다.",
          "정확한 대상자와 신청서류는 농지소재지 담당 기관에 재확인합니다."
        ],
        createdAt: new Date().toISOString()
      },
      {
        id: makeId(),
        title: "화순군 벼 육묘용 상토 공급 확인 필요",
        source: "내부 업무",
        region: "전남 화순군",
        category: "상토",
        startDate: "2026-05-26",
        endDate: "2026-06-30",
        method: "면사무소, 농협, 공급확인서 자료 확인",
        url: "",
        summaries: [
          "면별 공급 수량과 마을별 공급확인서 수량을 맞춰야 합니다.",
          "일반 상토와 유기농 상토를 구분해서 확인합니다.",
          "출력용 문서는 A4 한 장 기준으로 관리합니다."
        ],
        createdAt: new Date().toISOString()
      }
    ];

    let alerts = loadAlerts();
    let selectedId = alerts[0]?.id || null;

    const el = (id) => document.getElementById(id);

    function makeId() {
      if (window.crypto && typeof window.crypto.randomUUID === "function") {
        return window.crypto.randomUUID();
      }
      return `alarm_${Date.now()}_${Math.random().toString(16).slice(2)}`;
    }

    function loadAlerts() {
      try {
        const raw = localStorage.getItem(STORE_KEY);
        if (!raw) {
          localStorage.setItem(STORE_KEY, JSON.stringify(sampleAlerts));
          return sampleAlerts;
        }
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : sampleAlerts;
      } catch {
        return sampleAlerts;
      }
    }

    async function loadRemoteAlerts() {
      try {
        const res = await fetch(`alerts.json?ts=${Date.now()}`, { cache: "no-store" });
        if (!res.ok) return;
        const payload = await res.json();
        const remoteAlerts = Array.isArray(payload) ? payload : (payload.alerts || []);
        if (!Array.isArray(remoteAlerts) || !remoteAlerts.length) return;
        const normalized = remoteAlerts.map(a => ({
          id: a.id || makeId(),
          title: a.title || "제목 없음",
          source: a.source || "수집정보",
          region: a.region || "전국",
          category: a.category || "농업뉴스",
          startDate: a.startDate || a.published_at || "",
          endDate: a.endDate || a.deadline || "",
          method: a.method || "원문 확인 필요",
          url: a.url || "",
          summaries: a.summaries || a.summary || [],
          createdAt: a.createdAt || a.collected_at || new Date().toISOString(),
          remote: true
        }));
        const keyOf = (a) => a.url || `${a.title}|${a.source}|${a.startDate}`;
        const existing = new Map(alerts.map(a => [keyOf(a), a]));
        normalized.forEach(a => existing.set(keyOf(a), a));
        alerts = Array.from(existing.values());
        selectedId = alerts[0]?.id || selectedId;
        renderAll();
      } catch {
        // 로컬 파일로 열었거나 아직 alerts.json이 없으면 수동입력 데이터만 사용합니다.
      }
    }

    function saveAlerts() {
      localStorage.setItem(STORE_KEY, JSON.stringify(alerts));
    }

    function formatDate(value) {
      if (!value) return "미정";
      return value.replaceAll("-", ".");
    }

    function daysLeft(alert) {
      if (!alert.endDate) return null;
      const end = new Date(alert.endDate + "T23:59:59");
      return Math.ceil((end - today) / 86400000);
    }

    function statusOf(alert) {
      const left = daysLeft(alert);
      if (left === null) return { label: "일정미정", cls: "blue", card: "" };
      if (left < 0) return { label: "마감", cls: "red", card: "expired" };
      if (left <= 7) return { label: `D-${left}`, cls: "amber", card: "warn" };
      return { label: "진행중", cls: "green", card: "" };
    }

    function renderFilters() {
      const regions = ["전체지역", ...new Set(alerts.map(a => a.region || "미지정").sort())];
      const categories = ["전체품목", ...new Set(alerts.map(a => a.category || "기타").sort())];
      el("regionFilter").innerHTML = regions.map(x => `<option>${escapeHtml(x)}</option>`).join("");
      el("categoryFilter").innerHTML = categories.map(x => `<option>${escapeHtml(x)}</option>`).join("");
    }

    function filteredAlerts() {
      const q = el("searchInput").value.trim().toLowerCase();
      const region = el("regionFilter").value;
      const category = el("categoryFilter").value;
      return alerts
        .filter(a => region === "전체지역" || (a.region || "미지정") === region)
        .filter(a => category === "전체품목" || (a.category || "기타") === category)
        .filter(a => {
          if (!q) return true;
          return [a.title, a.source, a.region, a.category, a.method, ...(a.summaries || [])]
            .join(" ")
            .toLowerCase()
            .includes(q);
        })
        .sort((a, b) => {
          const ad = a.endDate || "9999-12-31";
          const bd = b.endDate || "9999-12-31";
          return ad.localeCompare(bd);
        });
    }

    function renderStats() {
      const statuses = alerts.map(statusOf);
      el("statTotal").textContent = alerts.length;
      el("statOpen").textContent = statuses.filter(s => s.label === "진행중").length;
      el("statSoon").textContent = statuses.filter(s => s.cls === "amber").length;
      el("statExpired").textContent = statuses.filter(s => s.cls === "red").length;
    }

    function renderList() {
      const list = filteredAlerts();
      if (!list.length) {
        el("alertList").innerHTML = `<div class="panel empty">조건에 맞는 알람이 없습니다.</div>`;
        renderPreview();
        return;
      }

      el("alertList").innerHTML = list.map(a => {
        const status = statusOf(a);
        const summaries = (a.summaries || []).slice(0, 3).map(x => `<li>${escapeHtml(x)}</li>`).join("");
        return `
          <article class="card ${status.card}" data-id="${a.id}">
            <div class="card-title">
              <strong>${escapeHtml(a.title || "제목 없음")}</strong>
              <span class="badge ${status.cls}">${status.label}</span>
            </div>
            <div class="meta">
              <span>${escapeHtml(a.region || "지역미정")}</span>
              <span>·</span>
              <span>${escapeHtml(a.category || "기타")}</span>
              <span>·</span>
              <span>${formatDate(a.startDate)} ~ ${formatDate(a.endDate)}</span>
            </div>
            <ul class="brief">${summaries}</ul>
            <div class="small">출처: ${escapeHtml(a.source || "미기입")} / 신청방법: ${escapeHtml(a.method || "미기입")}</div>
            <div class="actions">
              <button data-action="select" data-id="${a.id}">카톡문구</button>
              <button data-action="edit" data-id="${a.id}">수정</button>
              ${a.url ? `<button data-action="open" data-id="${a.id}">원문보기</button>` : ""}
            </div>
          </article>
        `;
      }).join("");

      renderPreview();
    }

    function renderPreview() {
      const selected = alerts.find(a => a.id === selectedId) || filteredAlerts()[0];
      if (!selected) {
        el("copyPreview").textContent = "알람을 선택하면 카톡 공유용 문구가 표시됩니다.";
        return;
      }
      selectedId = selected.id;
      el("copyPreview").textContent = makeKakaoText(selected);
    }

    function makeKakaoText(a) {
      const lines = [
        "[kFarmAI 우리지역 알림]",
        "",
        `${a.region || "지역미정"} ${a.category || "농업"} 정보`,
        a.title || "제목 없음",
        "",
        `신청기간: ${formatDate(a.startDate)} ~ ${formatDate(a.endDate)}`,
        `신청방법: ${a.method || "원문 확인 필요"}`,
        `출처: ${a.source || "미기입"}`,
        ""
      ];
      (a.summaries || []).slice(0, 3).forEach(s => lines.push(`- ${s}`));
      lines.push("");
      lines.push("정확한 대상자, 기간, 서류는 농지소재지 읍면사무소 또는 담당 기관에 재확인하세요.");
      if (a.url) {
        lines.push("");
        lines.push(a.url);
      }
      return lines.join("\n");
    }

    function fillForm(alert) {
      el("alertId").value = alert?.id || "";
      el("titleInput").value = alert?.title || "";
      el("sourceInput").value = alert?.source || "";
      el("regionInput").value = alert?.region || "";
      el("categoryInput").value = alert?.category || "상토";
      el("startDateInput").value = alert?.startDate || "";
      el("endDateInput").value = alert?.endDate || "";
      el("methodInput").value = alert?.method || "";
      el("urlInput").value = alert?.url || "";
      el("summaryInput").value = (alert?.summaries || []).join("\n");
    }

    function showTab(name) {
      document.querySelectorAll(".tab").forEach(btn => btn.classList.toggle("active", btn.dataset.tab === name));
      ["alerts", "register", "backup"].forEach(tab => {
        el(`tab-${tab}`).classList.toggle("hidden", tab !== name);
      });
      if (name === "backup") {
        el("backupText").value = JSON.stringify(alerts, null, 2);
      }
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function copyText(text) {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return;
      }
      const area = document.createElement("textarea");
      area.value = text;
      area.style.position = "fixed";
      area.style.left = "-9999px";
      document.body.appendChild(area);
      area.focus();
      area.select();
      document.execCommand("copy");
      area.remove();
    }

    function downloadJson() {
      const blob = new Blob([JSON.stringify(alerts, null, 2)], { type: "application/json;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `kfarmai_alarm_backup_${new Date().toISOString().slice(0, 10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    document.querySelectorAll(".tab").forEach(btn => {
      btn.addEventListener("click", () => showTab(btn.dataset.tab));
    });

    ["searchInput", "regionFilter", "categoryFilter"].forEach(id => {
      el(id).addEventListener("input", renderList);
      el(id).addEventListener("change", renderList);
    });

    el("alertList").addEventListener("click", (event) => {
      const button = event.target.closest("button");
      if (!button) return;
      const alert = alerts.find(a => a.id === button.dataset.id);
      if (!alert) return;

      if (button.dataset.action === "select") {
        selectedId = alert.id;
        renderPreview();
        copyText(makeKakaoText(alert)).catch(() => {});
      }
      if (button.dataset.action === "edit") {
        fillForm(alert);
        showTab("register");
      }
      if (button.dataset.action === "open" && alert.url) {
        window.open(alert.url, "_blank", "noopener,noreferrer");
      }
    });

    el("copyPreviewBtn").addEventListener("click", () => {
      copyText(el("copyPreview").textContent).catch(() => {});
    });

    el("reloadRemoteBtn").addEventListener("click", () => {
      loadRemoteAlerts();
    });

    el("newAlertBtn").addEventListener("click", () => fillForm(null));

    el("alertForm").addEventListener("submit", (event) => {
      event.preventDefault();
      const id = el("alertId").value || makeId();
      const payload = {
        id,
        title: el("titleInput").value.trim(),
        source: el("sourceInput").value.trim(),
        region: el("regionInput").value.trim(),
        category: el("categoryInput").value,
        startDate: el("startDateInput").value,
        endDate: el("endDateInput").value,
        method: el("methodInput").value.trim(),
        url: el("urlInput").value.trim(),
        summaries: el("summaryInput").value.split(/\n+/).map(x => x.trim()).filter(Boolean),
        createdAt: alerts.find(a => a.id === id)?.createdAt || new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };
      const idx = alerts.findIndex(a => a.id === id);
      if (idx >= 0) alerts[idx] = payload;
      else alerts.unshift(payload);
      selectedId = id;
      saveAlerts();
      renderAll();
      showTab("alerts");
    });

    el("deleteAlertBtn").addEventListener("click", () => {
      const id = el("alertId").value;
      if (!id) return;
      if (!confirm("이 알람을 삭제할까요?")) return;
      alerts = alerts.filter(a => a.id !== id);
      selectedId = alerts[0]?.id || null;
      saveAlerts();
      fillForm(null);
      renderAll();
      showTab("alerts");
    });

    el("exportBtn").addEventListener("click", downloadJson);
    el("importBtn").addEventListener("click", () => el("importFile").click());
    el("importFile").addEventListener("change", async (event) => {
      const file = event.target.files[0];
      if (!file) return;
      const text = await file.text();
      const parsed = JSON.parse(text);
      if (!Array.isArray(parsed)) {
        alert("JSON 배열 형식이 아닙니다.");
        return;
      }
      alerts = parsed;
      selectedId = alerts[0]?.id || null;
      saveAlerts();
      renderAll();
      showTab("alerts");
    });

    function renderAll() {
      renderFilters();
      renderStats();
      renderList();
    }

    el("todayText").textContent = new Intl.DateTimeFormat("ko-KR", {
      year: "numeric",
      month: "2-digit",
      day: "2-digit",
      weekday: "short"
    }).format(today);

    renderAll();
    loadRemoteAlerts();
  </script>
</body>
</html>
